<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiMarket - Meu Perfil</title>
    <link rel="stylesheet" href="../src/css/main.css">
</head>
<body>

    <header class="profile-header">
        <div class="header-content">
            <div class="user-info">
                <img id="user-avatar" src="" alt="Avatar do Usuário" class="avatar-circle">
                <h2 id="welcome-message">Carregando...</h2>
            </div>
            
            <button onclick="fazerLogout()" class="btn-logout">Sair</button>
        </div>
    </header>

    <main class="profile-container">
        

        <section class="user-details-card">
            <h3>Informações da Conta</h3>
            <p>Esta é a tua área exclusiva no MultiMarket. Aqui poderás gerir as tuas compras e dados.</p>
            
            <div class="info-group">
                <label>Status da Sessão:</label>
                <span class="status-badge">Autenticado via JWT</span>
            </div>
        </section>
    </main>

    <script src="../src/javascript/login.js"></script>
</body>
</html>
