<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>
    <link rel="stylesheet" href="../src/css/catalog.css">
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body>
    <section class="logo-icon">
        <img src="../src/assets/icon/logo-icon.svg" alt="Logo da empresa">
    </section>
    <section>
        <form class="form-container">
            <button id="" class="profile-icon"><img src="../src/assets/icon/profile-icon.svg"
                    alt="Perfil do Usuário "></button>
            <button id="" class="cart-icon"><img src="../src/assets/icon/cart-icon.svg"
                    alt="Carrinho de compras"></button>
        </form>
        <form class="search-container" action="#" method="get">
            <input type="text" placeholder="Buscar" name="q" required>
            <button type="submit"><i class="fas fa-search"></i></button>
        </form>
    </section>
    <menu>
        <label class="">Início</label>
        <input type="button" value="" id="" class="">
        <label for=""></label>
    </menu>
</body>

</html>
