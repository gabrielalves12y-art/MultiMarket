<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>
    <link rel="stylesheet" href="../src/css/catalog.css">
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body>
    <div class="header-catalog">
        <section class="logo-icon">
            <img src="../src/assets/icon/logo-icon.svg" alt="Logo da empresa">
        </section>
        <section>
            <form class="form-container">
                <a href="https://github.com/gabrielalves12y-art" id="" class="profile-icon"><img
                        src="../src/assets/icon/profile-icon.svg" alt="Perfil do Usuário "></a>
                <a href="https://www.pichau.com.br/cart" id="" class="cart-icon"><img
                        src="../src/assets/icon/cart-icon.svg" alt="Carrinho de compras">></a>
            </form>
            <form class="search-container" action="#" method="get">
                <input type="text" placeholder="Buscar" name="q" required>
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </section>
    </div>

    <footer class="footer-actions">
        <button class="btn-footer"><img src="../src/assets/icon/round-home-icon.svg" alt="Ícone do Home"></button>
        <button class="btn-footer"> <img src="../src/assets/icon/filter-icon.svg" alt="ícone dos filtros"></button>
    </footer>

    <script src="catalog.js"></script>

</body>

</html>
